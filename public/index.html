<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Social Media Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="container">
        <header>
            <h1 class="gradient-text">AnyGrab</h1>
            <p>Download videos from TikTok, Instagram, YouTube & X instantly.</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="urlInput" placeholder="Paste your video link here..." autocomplete="off">
                <button id="extractBtn">
                    <span class="btn-text">Extract</span>
                    <div class="spinner hide" id="extractSpinner"></div>
                </button>
            </div>
            
            <div id="errorBox" class="error-box hide"></div>

            <div id="resultCard" class="result-card hide">
                <div class="media-preview">
                    <img id="mediaThumbnail" src="" alt="Video Thumbnail">
                    <div class="platform-badge" id="platformBadge">TikTok</div>
                </div>
                <div class="media-info">
                    <h2 id="mediaTitle">Video Title</h2>
                    <div class="stats">
                        <span id="mediaViews">👁 0</span>
                        <span id="mediaLikes">❤️ 0</span>
                    </div>
                    <button class="download-btn" id="downloadBtn">
                        <span class="btn-text">Download High Quality</span>
                        <div class="spinner hide" id="downloadSpinner"></div>
                    </button>
                </div>
                <div id="carouselGallery" class="carousel-gallery hide"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
